# ============================================================
# GITHUB ACTIONS CI/CD — Interview Essentials
# Save this as: .github/workflows/ci.yml
# ============================================================

name: CI/CD Pipeline

# Trigger on push or pull request to main/develop
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── TEST JOB ────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest   # VM to run on

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # clone the repo

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"             # cache pip packages

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: pytest --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3

  # ── LINT JOB ─────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install flake8 black isort

      - name: Run flake8
        run: flake8 . --max-line-length=100 --exclude=.git,venv

      - name: Check formatting
        run: black --check .

  # ── BUILD AND PUSH DOCKER IMAGE ───────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [test, lint]   # only run if test and lint pass

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push:    true
          tags:    ${{ secrets.DOCKERHUB_USERNAME }}/myapp:latest

  # ── DEPLOY TO PRODUCTION ──────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs:   build
    if:      github.ref == 'refs/heads/main'   # only deploy on main branch

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /app
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/myapp:latest
            docker-compose up -d
            docker system prune -f
